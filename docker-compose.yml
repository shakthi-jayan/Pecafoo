version: "3.9"

services:
  # ---------------- PostgreSQL ----------------
  db:
    image: postgres:16-alpine
    container_name: pecafoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-food_delivery_db}
      POSTGRES_USER: ${DB_USER:-food_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-food_user} -d ${DB_NAME:-food_delivery_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------- Redis ----------------
  redis:
    image: redis:7-alpine
    container_name: pecafoo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------- Django API ----------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CACHE_LOCATION: redis://redis:6379/3
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  # ---------------- Celery Worker ----------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

  # ---------------- Celery Beat ----------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  logs_data: