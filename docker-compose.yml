# ============================================
# Pecafoo — Docker Compose (Full Stack)
# ============================================
# Services: Django API, PostgreSQL, Redis, Celery Worker, Celery Beat
# ============================================

version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: pecafoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: food_delivery_db
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U food_user -d food_delivery_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + Celery Broker + Channel Layer) ──
  redis:
    image: redis:7-alpine
    container_name: pecafoo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (Daphne ASGI) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "

  # ── Celery Worker ──
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    command: celery -A config worker --loglevel=info --concurrency=2

  # ── Celery Beat (Scheduler) ──
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    command: celery -A config beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
