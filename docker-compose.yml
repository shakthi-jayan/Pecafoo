# ============================================
# Pecafoo — Docker Compose (Full Stack)
# ============================================
# Services: Django API, PostgreSQL, Redis, Celery Worker, Celery Beat,
#           Customer App, Restaurant App
# ============================================

version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: pecafoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: food_delivery_db
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U food_user -d food_delivery_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + Celery Broker + Channel Layer) ──
  redis:
    image: redis:7-alpine
    container_name: pecafoo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (Daphne ASGI) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
      - DEBUG=False
      - ALLOWED_HOSTS=machodev.com,www.machodev.com,136.185.11.23,localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=https://machodev.com,https://www.machodev.com,http://136.185.11.23:3005,http://136.185.11.23:3002,http://136.185.11.23:3003,http://136.185.11.23:3004
      - CORS_ALLOWED_ORIGINS=https://machodev.com,https://www.machodev.com,http://136.185.11.23:3002,http://136.185.11.23:3003,http://136.185.11.23:3004,http://136.185.11.23:3005
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "

  # ── Celery Worker ──
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    command: celery -A config worker --loglevel=info --concurrency=2

  # ── Celery Beat (Scheduler) ──
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pecafoo_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CACHE_BACKEND=django_redis.cache.RedisCache
      - CACHE_LOCATION=redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    command: celery -A config beat --loglevel=info

  # ── Customer App (React/Vite) ──
  customer-app:
    build:
      context: ./frontend/customer-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://machodev.com/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-wss://machodev.com/ws}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
    container_name: pecafoo_customer_app
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - api

  # ── Restaurant App (React/Vite) ──
  restaurant-app:
    build:
      context: ./frontend/restaurant-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://machodev.com/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-wss://machodev.com/ws}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    container_name: pecafoo_restaurant_app
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

