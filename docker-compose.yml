      - "traefik.http.routers.pecafoo-admin.service=pecafoo-admin-svc"
      - "traefik.http.services.pecafoo-admin-svc.loadbalancer.server.port=80"

volumes:
  postgres_data:
  redis_data:

networks:
  pecafoo_internal:
    driver: bridge
  dokploy-network:
    external: true
