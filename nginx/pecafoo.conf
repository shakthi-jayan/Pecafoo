# ============================================
# Pecafoo Nginx Reverse Proxy Configuration
# For: machodev.com (136.185.11.23)
# ============================================
# Install: sudo cp nginx/pecafoo.conf /etc/nginx/sites-available/pecafoo
#          sudo ln -s /etc/nginx/sites-available/pecafoo /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# ============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name machodev.com www.machodev.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name machodev.com www.machodev.com;

    # ── SSL Certificates (Let's Encrypt) ──
    ssl_certificate /etc/letsencrypt/live/machodev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/machodev.com/privkey.pem;

    # ── SSL Protocol Settings ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ── Client Settings ──
    client_max_body_size 10M;

    # ── Customer App (default route) ──
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Restaurant App ──
    location /restaurant {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/restaurant(/.*)$ $1 break;
    }

    # ── Django API ──
    location /api/ {
        proxy_pass http://127.0.0.1:3005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass http://127.0.0.1:3005/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Media Files (with caching) ──
    location /media/ {
        proxy_pass http://127.0.0.1:3005/media/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static Files (with aggressive caching) ──
    location /static/ {
        proxy_pass http://127.0.0.1:3005/static/;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket connections ──
    location /ws/ {
        proxy_pass http://127.0.0.1:3005/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
