name: Mobile CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/mobile/**'

jobs:
  build:
    name: EAS Build All Apps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Customer App
        run: eas build --platform all --profile production --non-interactive
        working-directory: frontend/mobile/apps/customer
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Restaurant App
        run: eas build --platform all --profile production --non-interactive
        working-directory: frontend/mobile/apps/restaurant
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Delivery App
        run: eas build --platform all --profile production --non-interactive
        working-directory: frontend/mobile/apps/delivery
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Admin App
        run: eas build --platform all --profile production --non-interactive
        working-directory: frontend/mobile/apps/admin
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
